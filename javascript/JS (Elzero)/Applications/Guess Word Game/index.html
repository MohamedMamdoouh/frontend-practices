<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Word</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="notification-container" id="notificationContainer"></div>
    <div class="container">
      <h1>Guess The Word</h1>

      <div class="settings">
        <div class="setting-group">
          <label for="cols">Columns:</label>
          <input type="number" id="cols" min="3" max="6" value="5" />
        </div>

        <div class="setting-group">
          <label for="rows">Rows:</label>
          <input type="number" id="rows" min="2" max="8" value="3" />
        </div>

        <button id="applySettings">Apply Settings</button>
      </div>

      <div class="stats-container">
        <div class="stat-item">
          <span class="stat-label">Current Streak</span>
          <span class="stat-value" id="currentStreak">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Best Streak</span>
          <span class="stat-value" id="bestStreak">0</span>
        </div>
      </div>

      <div class="game-wrapper">
        <div class="game-section">
          <div id="board" class="board">
            <!-- This will be filled dynamically in js -->
          </div>

          <div class="controls">
            <button id="checkBtn">Check Word</button>
            <button id="hintBtn">Hint</button>
          </div>
        </div>
      </div>

      <div class="legend">
        <p><span class="box correct"></span> Letter right & in place</p>
        <p><span class="box present"></span> Letter right but wrong place</p>
        <p><span class="box wrong"></span> Letter not in word</p>
      </div>
    </div>
  </body>
</html>
