<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
    <script src="script.js" defer></script>
  </head>

  <body>
    <span class="my-span">My Span</span>
    <span class="my-span">My Span22</span>

    <p>Hello Paragraph 1</p>
    <p>Hello Paragraph 2</p>

    <div id="my-div">Hello Div</div>

    <img src="" alt="demo" />

    <form action="">
      <input type="text" name="one" value="Hello" />
    </form>

    <form action="">
      <input type="text" name="two" .value="Hello" />
    </form>

    <a href="https://google.com">Google</a>
    <a href="https://facebook.com">Facebook</a>

    <div id="dom">
      Hello Div
      <p>Hello P</p>
      <span>Hello Span</span
      ><!-- Comment -->Hello
    </div>

    <button id="btn">Button</button>

    <form action="">
      <input type="text" name="username" placeholder="Max 10 Chars Only" />
      <input type="number" name="age" placeholder="Can't Be Empty" />
      <input type="submit" value="Submit Data" />
    </form>
    <a href="https://google.com">Google</a>

    <form action="">
      <input class="one" type="text" />
      <input class="two" type="text" />
      <input type="submit" value="Submit Data" />
    </form>
    <a href="https://google.com" target="_blank">Google</a>

    <div id="my-div2" class="one two show test">Div With Many Classes</div>
  </body>
</html>
