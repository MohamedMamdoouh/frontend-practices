<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Project 1 — Async Data Loader</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="app">
      <div class="card">
        <h2>Async Data Loader</h2>
        <p class="muted">
          Loads users from a public API. Shows loading, errors, and retry.
        </p>

        <div class="row">
          <button id="btnLoad">Load Users</button>
          <button id="btnRetry" class="secondary" disabled>Retry</button>
          <span class="muted" id="meta"></span>
        </div>

        <div class="status" id="status" style="display: none">
          <div class="spinner"></div>
          <div>Loading…</div>
        </div>

        <div id="error" class="muted"></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </body>
</html>
