<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog App</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27%3E%3Cpath fill=%27%23667eea%27 d=%27M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z%27/%3E%3C/svg%3E" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <div class="container">
      <!-- Auth Pages -->
      <div id="auth-container">
        <div class="auth-forms">
          <!-- Sign In Form -->
          <div id="signin-form" class="form-container active">
            <h2>Sign In</h2>
            <form id="login-form">
              <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" required />
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required />
              </div>
              <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p>
              Don't have an account? <a href="#" id="show-signup">Sign Up</a>
            </p>
          </div>

          <!-- Sign Up Form -->
          <div id="signup-form" class="form-container">
            <h2>Sign Up</h2>
            <form id="register-form">
              <div class="form-group">
                <label for="register-username">Username</label>
                <input type="text" id="register-username" required />
              </div>
              <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" required />
              </div>
              <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" required />
                <small class="password-hint"
                  >Must be at least 6 characters</small
                >
              </div>
              <div class="form-group">
                <label for="register-confirm-password">Confirm Password</label>
                <input
                  type="password"
                  id="register-confirm-password"
                  required
                />
              </div>
              <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <p>
              Already have an account? <a href="#" id="show-signin">Sign In</a>
            </p>
          </div>
        </div>
      </div>

      <!-- Blog Page -->
      <div id="blog-container" class="hidden">
        <div class="blog-header">
          <h1>Blog Posts</h1>
          <div class="user-info">
            <span id="user-display"></span>
            <button id="logout-btn" class="btn-secondary">Logout</button>
          </div>
        </div>

        <div class="blog-content">
          <!-- Create Post Form -->
          <div class="create-post">
            <h3>Create New Post</h3>
            <form id="post-form">
              <div class="form-group">
                <input
                  type="text"
                  id="post-title"
                  placeholder="Post Title"
                  required
                />
              </div>
              <div class="form-group">
                <textarea
                  id="post-content"
                  placeholder="Write your post here..."
                  required
                ></textarea>
              </div>
              <button type="submit" class="btn-primary">Publish Post</button>
            </form>
          </div>

          <!-- Posts List -->
          <div class="posts-list" id="posts-list">
            <!-- Posts will be dynamically added here -->
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
