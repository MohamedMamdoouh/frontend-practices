<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Transitions – Combined Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            color: #333;
            padding: 2rem;
            margin: auto;
            line-height: 1.5;
        }

        h1,
        h2 {
            text-align: center;
            margin-bottom: 1rem;
        }

        section {
            margin-bottom: 3rem;
        }

        .demo-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .demo-box {
            width: 100px;
            height: 100px;
            background: #e74c3c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .label {
            text-align: center;
            font-size: 0.85rem;
            color: #555;
            margin-top: 0.5rem;
            max-width: 100px;
        }

        .width-demo {
            transition-property: width;
            transition-duration: 2s;
        }

        .width-demo:hover {
            width: 200px;
        }

        .delay-demo {
            transition: background-color 1s ease 0.5s;
        }

        .delay-demo:hover {
            background-color: #3498db;
        }

        .timing-demo {
            transition: transform 1s;
        }

        .timing-demo.ease:hover {
            transition-timing-function: ease;
            transform: translateY(-20px);
        }

        .timing-demo.linear:hover {
            transition-timing-function: linear;
            transform: translateY(-20px);
        }

        .timing-demo.in-out:hover {
            transition-timing-function: ease-in-out;
            transform: translateY(-20px);
        }

        .shorthand-demo {
            transition:
                background-color 0.8s ease-in-out 0.2s,
                transform 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .shorthand-demo:hover {
            background-color: #2ecc71;
            transform: rotate(15deg) scale(1.2);
        }
    </style>
</head>

<body>

    <h1>CSS Transitions -- Combined Demo</h1>

    <section>
        <h2>1. Width Expansion</h2>
        <div class="demo-container">
            <div>
                <div class="demo-box width-demo">Hover</div>
                <div class="label">width → 200 px<br>duration 2 s</div>
            </div>
        </div>
    </section>

    <section>
        <h2>2. Delayed Background Change</h2>
        <div class="demo-container">
            <div>
                <div class="demo-box delay-demo">Hover</div>
                <div class="label">bg-color<br>1 s dur · 0.5 s delay</div>
            </div>
        </div>
    </section>

    <section>
        <h2>3. Easing Curves</h2>
        <div class="demo-container">
            <div>
                <div class="demo-box timing-demo ease">Ease</div>
                <div class="label">ease</div>
            </div>
            <div>
                <div class="demo-box timing-demo linear">Lin</div>
                <div class="label">linear</div>
            </div>
            <div>
                <div class="demo-box timing-demo in-out">In-Out</div>
                <div class="label">ease-in-out</div>
            </div>
        </div>
    </section>

    <section>
        <h2>4. Multiple-Property Shorthand</h2>
        <div class="demo-container">
            <div>
                <div class="demo-box shorthand-demo">Hover</div>
                <div class="label">bg + transform<br>custom cubic</div>
            </div>
        </div>
    </section>

</body>

</html>
