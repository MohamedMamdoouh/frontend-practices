<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooltip</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            color: #0084ff;
            cursor: pointer;
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 120px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

    </style>
</head>

<body>
    <br><br>
    <p>
        Hover over the <span class="tooltip"><strong>word</strong>
            <span class="tooltip-text">this is a tooltip</span></span>
        to see more info.
    </p>
</body>

</html>
