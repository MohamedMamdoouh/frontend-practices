<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-areas:
                "featured featured featured"
                "post1 post2 post3"
                "post4 post5 post6";
            gap: 1rem;
        }

        .post {
            background: #f2f2f2;
            padding: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .featured {
            grid-area: featured;
            background: #4a90e2;
            padding: 1.5rem;
            color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .featured h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .post h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "featured"
                    "post"
                    "post"
                    "post"
                    "post"
                    "post"
                    "post";
            }
        }
    </style>
</head>

<body>
    <h1>My Blog</h1>
    <div class="container">

        <article class="featured">
            <h2>Featured Article</h2>
            <p>This is the standout post that spans all columns.</p>
        </article>

        <article class="post">
            <h3>Post 1</h3>
            <p>Summary of post one.</p>
        </article>

        <article class="post">
            <h3>Post 2</h3>
            <p>Summary of post 2.</p>
        </article>

        <article class="post">
            <h3>Post 3</h3>
            <p>Summary of post 3.</p>
        </article>

        <article class="post">
            <h3>Post 4</h3>
            <p>Summary of post 4.</p>
        </article>

        <article class="post">
            <h3>Post 5</h3>
            <p>Summary of post 5.</p>
        </article>

        <article class="post">
            <h3>Post 6</h3>
            <p>Summary of post 6.</p>
        </article>
    </div>
</body>

</html>
