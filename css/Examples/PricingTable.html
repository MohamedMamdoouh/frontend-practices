<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .pricing-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .plan {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .plan-header {
            background-color: #007bff;
            color: #fff;
            font-weight: bold;
            padding: 1rem;
            text-align: center;
            border-radius: 5px;
        }

        .plan-price {
            font-size: 2rem;
            font-weight: bold;
            margin: 1rem 0;
            text-align: center;
        }

        .plan-features ul {
            padding-inline-start: 1rem;
        }

        .plan-features li {
            list-style: none;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .plan-features li:last-child {
            border-bottom: none;
        }

        .plan-footer {
            background-color: #007bff;
            font-weight: bold;
            padding: 1rem;
            text-align: center;
            border-radius: 5px;
        }

        .plan-footer a {
            text-decoration: none;
            color: #fff;
        }

        @media screen and (max-width: 768px) {
            .pricing-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <h1>Our Pricing Plans</h1>
    <div class="pricing-container">

        <div class="plan">
            <div class="plan-header">Basic</div>
            <div class="plan-price">$9/mo</div>
            <div class="plan-features">
                <ul>
                    <li>1 User</li>
                    <li>10GB Storage</li>
                    <li>10 GB Bandwidth</li>
                    <li>1 Domain</li>
                </ul>
            </div>
            <div class="plan-footer"> <a href="#">Choose Basic</a></div>
        </div>

        <div class="plan">
            <div class="plan-header">Pro</div>
            <div class="plan-price">$29/mo</div>
            <div class="plan-features">
                <ul>
                    <li>5 User</li>
                    <li>100GB Storage</li>
                    <li>50 GB Bandwidth</li>
                    <li>5 Domain</li>
                </ul>
            </div>
            <div class="plan-footer"> <a href="#">Choose Pro</a></div>
        </div>

        <div class="plan">
            <div class="plan-header">Enterprise</div>
            <div class="plan-price">$99/mo</div>
            <div class="plan-features">
                <ul>
                    <li>50 User</li>
                    <li>500GB Storage</li>
                    <li>Unlimited Bandwidth</li>
                    <li>30 Domain</li>
                </ul>
            </div>
            <div class="plan-footer"><a href="#">Choose Enterprise</a></div>
        </div>
    </div>
</body>

</html>
