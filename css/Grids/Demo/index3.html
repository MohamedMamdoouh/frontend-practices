<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: justify-content & align-content</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .flex-container {
            display: flex;
            flex-wrap: wrap;
            min-height: 200px;
            border: 2px solid #333;
            gap: 1rem;
            justify-content: center;
            align-content: center;
            padding: 1rem;
        }

        .flex-item {
            flex: 1 1 250px;
            min-height: 100px;
            background: #4a90e2;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        @media screen and (max-width: 768px) {
            .flex-item {
                flex: 1 1 150px;
            }
        }

        @media screen and (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            
            .flex-container {
                gap: 0.5rem;
                padding: 0.5rem;
            }

            .flex-item {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>
    <h2>Flexbox Container</h2>
    <p><em>Tracks are flex lines; extra space is distributed.</em></p>
    <div class="flex-container">
        <div class="flex-item">A</div>
        <div class="flex-item">B</div>
        <div class="flex-item">C</div>
        <div class="flex-item">D</div>
        <div class="flex-item">E</div>
        <div class="flex-item">F</div>
    </div>
</body>

</html>
