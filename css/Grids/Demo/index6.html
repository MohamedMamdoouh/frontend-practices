<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implicit Columns with grid-auto-columns</title>
    <style>
        body {
            padding-left: 15px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .grid2 {
            display: grid;
            grid-template-rows: repeat(2, 80px);
            grid-auto-flow: column;
            grid-auto-columns: 120px;
            gap: 10px;
        }

        .grid2 div {
            background: #e94c3d;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h2>Implicit Columns Demo</h2>
    <div class="grid2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
</body>

</html>
