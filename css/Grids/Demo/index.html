<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Placing Grid Items By Line Numbers</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1rem;
            padding: 20px;
        }

        .item {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #4f8eda;
            color: #fff;
            padding: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 5px;
        }

        .item1 {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 3;
        }

        .item5 {
            grid-column: 2 / 4;
            grid-row: 2 / 3;
        }
    </style>
</head>

<body>
    <h2>Placing Grid Items by Line Numbers</h2>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item item5">5</div>
        <div class="item">6</div>
    </div>
</body>

</html>
