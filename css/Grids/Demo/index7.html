<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>grid-auto-flow Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(2, 80px);
            gap: 10px;
            margin-top: 0.5rem;
            background: #eee;
            padding: 10px;
        }

        .grid div {
            background: #4a90e2;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 1) Default row flow */
        .flow-row {
            grid-auto-flow: row;
        }

        /* 2) Column flow */
        .flow-column {
            grid-auto-flow: column;
        }

        /* 3) Row dense */
        .flow-row-dense {
            grid-auto-flow: row dense;
            /* intentionally leave a gap by spanning item3 */
        }

        /* force item3 to span two columns to create a hole */
        .flow-row-dense .item3 {
            grid-column: span 2;
        }

        /* 4) Column dense */
        .flow-col-dense {
            grid-auto-flow: column dense;
        }

        .flow-col-dense .item3 {
            grid-row: span 2;
        }
    </style>
</head>

<body>
    <h2>1. `grid-auto-flow: row;` (default)</h2>
    <div class="grid flow-row">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>2. `grid-auto-flow: column;`</h2>
    <div class="grid flow-column">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>3. `grid-auto-flow: row dense;`</h2>
    <div class="grid flow-row-dense">
        <div>1</div>
        <div>2</div>
        <div class="item3">3⇢span2</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>4. `grid-auto-flow: column dense;`</h2>
    <div class="grid flow-col-dense">
        <div>1</div>
        <div>2</div>
        <div class="item3">3⇢span2</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

</body>

</html>
