<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>

    <style>
        .container {
            background-color: bisque;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .box {
            flex: 1 1 calc(33.333% - 1rem);
            background-color: #ccc;
            padding: 20px;
            text-align: center;
        }

        @media screen and (min-width: 1200px) {
            .box {
                flex: 1 1 calc(25% - 1rem);
                background: #b8daff;
            }
        }
    </style>
</head>

<body>
    <h1>Resize ≥ 1200px for Four Columns</h1>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>
</body>

</html>
