<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS RGB Colors Example</title>

    <style>
        body {
            background-color: rgb(240, 240, 240);
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            color: #000076;
            text-align: center;
        }

        h2 {
            color: #FFF;
            /* FFFFFF*/
        }

        h3 {
            color: #F0A;
            /* FF00AA */
        }

        p {
            color: rgb(51, 51, 51);
            font-size: 18px;
        }

        .overlay {
            background-color: rgba(255, 0, 0, 0.2);
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgb(255, 0, 0);
        }
    </style>
</head>

<body>
    <h1>Welcome to CSS RGB Colors!</h1>
    <p>
        CSS RGB colors allow you to mix red, green, and blue in various intensities. You can also control transparency
        using RGBA.
    </p>
    <div class="overlay">
        <p>This div has a semi-transparent red background, demonstrating the rgba() function.</p>
    </div>
</body>

</html>
