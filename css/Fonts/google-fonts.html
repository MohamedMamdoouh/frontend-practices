<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Fonts</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700
        &family=Cairo:wght@200..1000&family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&family=Rakkas&display=swap"
        rel="stylesheet">
    <style>
        .amiri-regular {
            font-family: "Amiri", serif;
            font-weight: 400;
            font-style: normal;
        }

        .amiri-bold {
            font-family: "Amiri", serif;
            font-weight: 700;
            font-style: normal;
        }

        .amiri-regular-italic {
            font-family: "Amiri", serif;
            font-weight: 400;
            font-style: italic;
        }

        .amiri-bold-italic {
            font-family: "Amiri", serif;
            font-weight: 700;
            font-style: italic;
        }

        .rakkas-regular {
            font-family: "Rakkas", serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>

<body>
    <p class="amiri-regular">This is a paragraph using Amiri amiri-regular.</p>
    <p class="amiri-bold">This is a paragraph using amiri-bold.</p>
    <p class="rakkas-regular">This is a paragraph using rakkas-regular.</p>
</body>

</html>
