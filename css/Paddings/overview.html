<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Box Model Example</title>
    <style>
        .box {
            margin: 30px;
            border: 10px solid #7cb342;
            padding: 30px;
            width: 200px;
            text-align: center;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .label {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            background: white;
            padding: 2px 6px;
        }

        .margin-label {
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        .border-label {
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            color: blue;
        }

        .padding-label {
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
        }

        .content-label {
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
        }

        .content {
            border: 1px dashed black;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="box">
        <span class="label margin-label">Margin</span>
        <span class="label border-label">Border</span>
        <span class="label padding-label">Padding</span>
        <div class="content">
            <span class="label content-label">Content</span>
        </div>
    </div>
</body>

</html>
