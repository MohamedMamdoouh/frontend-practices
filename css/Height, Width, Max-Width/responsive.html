<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Width Example</title>
    <style>
        .responsive-box {
            width: 100%;
            max-width: 800px;
            height: auto;
            background-color: #B3E5FC;
            border: 2px solid #0288D1;
            margin: 20px auto;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="responsive-box">
        This box has a responsive width that fills the container up to a maximum of 800px. Resize your browser window to
        see the effect.
    </div>
</body>

</html>
