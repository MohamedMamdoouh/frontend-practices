<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Combined Dimensions Example</title>
    <style>
        .combined-box {
            width: 80vw;
            max-width: 500px;
            height: 80vh;
            max-height: 500px;
            background-color: #C8E6C9;
            border: 2px solid #2E7D32;
            margin: 20px auto;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="combined-box">
        This box combines a responsive width with a fixed height. It adjusts its width based on the container but
        maintains a consistent height.
    </div>
</body>

</html>
