<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Test2</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 1rem;
            line-height: 1.5;
        }

        h1,
        h2,
        p {
            margin: 1rem;
        }

        .flex-container {
            margin: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            background-color: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 4px;
            gap: 1rem;
        }

        .flex-item {
            background-color: #4CAF50;
            margin: 0;
            padding: 0.7rem;
            text-align: center;
            color: white;
            font-size: 20px;
            flex: 0 0 calc(33.333% - 0.667rem);
            border: 1px solid rgb(51, 69, 43);
            border-radius: 4px;
        }

        @media (max-width: 700px) {
            .flex-item {
                flex: 1 1 calc(33.3% - 1rem);
            }
        }

        @media (max-width: 600px) {
            .flex-item {
                flex: 1 1 calc(50% - 1rem);
            }
        }

        @media (max-width: 500px) {
            .flex-item {
                flex: 1 1 calc(100% - 1rem);
            }
        }
    </style>
</head>

<body>
    <h1>CSS <code>display: flex</code> Demo</h1>
    <section>
        <h2>Responsive Flex Container</h2>
        <div class="flex-container">
            <div class="flex-item">Item 1</div>
            <div class="flex-item">Item 2</div>
            <div class="flex-item">Item 3</div>
            <div class="flex-item">Item 4</div>
            <div class="flex-item">Item 5</div>
            <div class="flex-item">Item 6</div>
        </div>
        <p>
            Each item has a base width of 150px, flexibly grows and shrinks, wraps to new lines on narrow screens.
        </p>
    </section>
</body>

</html>
