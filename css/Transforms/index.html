<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transforms</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
        }

        .box {
            width: 150px;
            height: 150px;
            background: #3498db;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            transition: transform 0.5s ease;
        }

        .translate:hover {
            transform: translate(10px, 20px);
        }

        .rotate:hover {
            transform: rotate(45deg);
        }

        .scale:hover {
            transform: scale(1.5, 1.25);
        }

        .skew:hover {
            transform: skew(20deg, 20deg);
        }

        .combo:hover {
            transform: translate(10px, 20px) rotate(45deg) scale(1.5) skew(20deg, 20deg);
        }

        .scene {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            margin: 3rem auto;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }

        .card {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        .card:hover {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .front {
            background: #3498db;
        }

        .back {
            background: #2ecc71;
            transform: rotateY(180deg);
        }
    </style>
</head>

<body>
    <h1>CSS 2D Transform Examples</h1>
    <div class="grid">
        <div class="box translate">Translate</div>
        <div class="box rotate">Rotate</div>
        <div class="box scale">Scale</div>
        <div class="box skew">Skew</div>
        <div class="box combo">Combo</div>
    </div>

    <div class="scene">
        <div class="card">
            <div class="face front">Front</div>
            <div class="face back">Back</div>
        </div>
    </div>
</body>

</html>
