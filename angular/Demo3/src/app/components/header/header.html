<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <button
    class="navbar-toggler"
    type="button"
    data-toggle="collapse"
    data-target="#navbarSupportedContent"
    aria-controls="navbarSupportedContent"
    aria-expanded="false"
    aria-label="Toggle navigation"
  >
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" routerLink="/home" routerLinkActive="bg-success">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/about" routerLinkActive="bg-success">About</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/products" routerLinkActive="bg-success">Products</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/add-product" routerLinkActive="bg-success">Add Product</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/register" routerLinkActive="bg-success">Register</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/login" routerLinkActive="bg-success">
          @if (!isUserLoggedIn) {
            <span (click)="login()">Login</span>
          } @else {
            <span (click)="logout()">Logout</span>
          }
        </a>
      </li>
      <li class="nav-item">
        <button class="nav-link" (click)="toggleLanguage()">Toggle Ar/En</button>
      </li>
    </ul>
  </div>

  <h4>counter = {{ counter$ | async }}</h4>
