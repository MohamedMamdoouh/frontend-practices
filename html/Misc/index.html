<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misc</title>
    <title>Disk Usage Meter Example</title>
    <link rel="stylesheet" href="style.css" as="style">
    <style>
        meter {
            width: 100%;
            height: 20px;
        }
    </style>
</head>

<body style="font-size: 20px;">
    <h1>Check Your Progress</h1>
    <label for="disk_c">Disk usage C:</label>
    <meter id="disk_c" min="1" max="100" low="30" high="70" optimum="100" value="25"></meter>
    <br>
    <hr> <br>

    <label for="download">Download progress:</label>
    <progress id="download" value="40" max="100"></progress>

    <br><br>
    <label for="upload">Upload progress:</label>
    <progress id="upload"></progress>
</body>

</html>
