<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }

        embed {
            border: 1px solid #ccc;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <h1>Demonstration of Various Embedded Content Types</h1>

    <embed src="../Images/Mohamed.JPEG" type="image/jpeg" width="300" height="auto">
    <embed src="../Images/Algorithms Summary.pdf" type="application/pdf" width="600" height="500">
    <embed src="../Videos/Funny.mp4" type="video/mp4" width="600" height="400">
    <embed src="../Videos/sample.mp3" type="audio/mp3" width="600" height="400">

    <object data="../Videos/sample.mp3" type="audio/mp3" width="600" height="400">
        <p>Your browser doesn't support thus type of object!</p>
    </object>
    <object data="../Images/Logo.png" type="image/png" width="300" height="auto">
        <p>Your browser doesn't support thus type of object!</p>
    </object>
    <object data="../Images/Mohamed.JPEG" type="image/jpeg" width="300" height="auto">
        <p>Your browser doesn't support thus type of object!</p>
    </object>
</body>

</html>
