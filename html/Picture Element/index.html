<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image</title>
</head>

<body>
<picture>
    <source media="(min-width: 800px)" srcset="..//Images//large-image.jpg">
    <source media="(min-width: 450px)" srcset="..//Images//medium-image.jpg">
    <img src="..//Images//small-image.jpg" alt="small">
</picture>
</body>

</html>
