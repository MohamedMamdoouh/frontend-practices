<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button As Link</title>
</head>

<body>
    <button onclick="window.location.href='https://www.youtube.com/'"> Visit YouTube</button><br><br>
    <button onclick="window.open('https://www.youtube.com/', '_blank')">Visit YouTube</button><br><br>
    <button onclick="window.open('https://www.youtube.com/','YouTube','width=600,height=400')">Visit YouTube</button><br>
</body>

</html>
