<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFrame Example</title>
</head>

<body>
    <p>Default Boarder</p>
    <iframe src="Page1.html" title="Example Frame1"></iframe>
    <iframe src="Page2.html" title="Example Frame2"></iframe>

    <p>Red Boarders</p>
    <iframe src="Page1.html" style="border: 2px solid red;" title="Example Frame1"></iframe>
    <iframe src="Page2.html" style="border: 2px solid red;" title="Example Frame2"></iframe>

    <p>Changing Width and Height</p>
    <iframe src="Page1.html" style="border: 2px solid red; width: 600px; height: 400px;"
        title="Example Frame1"></iframe>
    <iframe src="Page2.html" style="border: 2px solid red; width: 400; height: 400px;" title="Example Frame2"></iframe>

    <p>No Boarders</p>
    <iframe src="Page1.html" loading="lazy" style="border: none" title="Example Frame1"></iframe>
    <iframe src="Page2.html" loading="lazy" style="border:none;" title="Example Frame2"></iframe>
    <br>
    <iframe id="iframe" srcdoc="<p> this is html code</p>" style="border: 2px solid black;"
        title="Example inline Frame"></iframe>

    <br><br>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/Vw9yfpQdE24?si=K47YABeOvxbElXDG"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
